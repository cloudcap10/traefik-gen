name: Deploy Configs to VPS

on:
  push:
    branches: [ master ]
    paths:
      - '**/compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/jtadmin/gemini/docker-compose
            git pull origin master
            # Identify which folders changed and restart them
            for folder in $(git diff --name-only HEAD~1 | cut -d/ -f1 | sort -u); do
              if [ -f "$folder/compose.yml" ]; then
                echo "Deploying update to $folder..."
                cd $folder
                docker-compose up -d --remove-orphans
                cd ..
              fi
            done
