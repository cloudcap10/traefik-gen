http:
  middlewares:    
    default-security-headers:
      headers:
        customBrowserXSSValue: 0
        contentTypeNosniff: true
        forceSTSHeader: true
        frameDeny: false
        referrerPolicy: "strict-origin-when-cross-origin"
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 3153600
        contentSecurityPolicy: "default-src 'self'"     
        customRequestHeaders:
          X-Forwarded-Proto: https
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true
    # Added your production auth templates for reference
    grist-basic-auth:
      basicAuth:
        headerField: "X-Forwarded-User"
        users:
          - "joven.talasan@gmail.com:$2y$05$XlJlJelSHROkdATS7z7LTuhZ21YwJCX8jfZOYnp6ss5cmTHdLzfXS"
